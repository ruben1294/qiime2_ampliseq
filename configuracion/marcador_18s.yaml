# =============================================================================
#  marcador_18s.yaml
# -----------------------------------------------------------------------------
#  Parámetros de nf-core/ampliseq para amplicones de 18S de eucariotas. El
#  script 03 lo pasa a Nextflow con -params-file cuando se define a MARCADOR="18s".
#  Ajusta los primers y la base de datos a tu experimento, el catálogo de primers
#  está en primers_18s.tsv.
# =============================================================================


# Primers para hemoparásitos
FW_primer: "TTTGTCTGSTTAATTSCG"
RV_primer: "CACAGACCTGTTATTGC"

# Primers (TAReuk454FWD1 / TAReukREV3, región V4)
#FW_primer: "CCAGCASCYGCGGTAATTCC"
#RV_primer: "ACTTTCGTTCTTGATYRA"

# Base de datos de referencia para la inferencia taxonómica.
# Cada una se usa por un clasificador distinto en ampliseq:
#   pr2   (dada_ref_taxonomy):  base específica de eucariotas, a través de DADA2. Es la
#         recomendada para 18S de protistas.
#   silva (qiime_ref_taxonomy): la SILVA preformateada de QIIME2 es la combinada
#         16S/18S y sí sirve para eucariotas, pero a través de QIIME2.
# Ojo: la SILVA de DADA2 no sirve para 18S. La documentación de ampliseq la marca
# como optimizada para Bacteria y Archaea. Por eso, si usas SILVA, aquí va a través
# de qiime_ref_taxonomy y no por dada_ref_taxonomy.

# PR2 por DADA2
dada_ref_taxonomy: "pr2=5.1.0"

# SILVA 16S/18S por QIIME2. Comenta la línea de arriba y descomenta esta:
#qiime_ref_taxonomy: "silva=138"

# --- HPC sin internet (offline) ---
# Las claves de arriba DESCARGAN la base al correr; offline eso falla. Precarga la
# base en LUSTRE (DIR_BASES_HPC) en el nodo interactivo y apunta a archivos locales.
# Por DADA2 (PR2, formato assignTaxonomy):
#dada_ref_tax_custom: "/LUSTRE/bioinformatica_data/BD/metagenomica/PR2/pr2_version_5.1.0_SSU_dada2.fasta.gz"
# O por QIIME2 (SILVA preformateada de QIIME2, clasificador entrenado):
#qiime_ref_tax_custom: "/LUSTRE/bioinformatica_data/BD/metagenomica/SILVA/silva-138-99-nb-classifier.qza"
# El nombre/URL EXACTO que usa esta versión del pipeline lo sacas con:
#   grep -iA4 'pr2\|silva' ~/.nextflow/assets/.repos/nf-core/ampliseq/conf/ref_databases.config

# --- Clasificación alternativa / avanzada (opcional) ---
# Clasificador QIIME2 ya entrenado (.qza), en vez de entrenar desde la base. Debe
# coincidir con el par de primers/región de este marcador. --classifier
#classifier: "/ruta/al/clasificador.qza"

# Colocación filogenética de ASVs con EPA-ng: los clasifica colocándolos en un árbol
# de referencia que tú aportas (específico del marcador). Las cinco claves se activan
# juntas; descoméntalas y ajústalas para usarlo.
#pplace_tree: "/ruta/arbol_referencia.nwk"          # árbol de referencia (newick). --pplace_tree
#pplace_aln: "/ruta/secuencias_referencia.fasta"    # secuencias de referencia. --pplace_aln
#pplace_model: "GTR+I+F"                            # modelo evolutivo (ej. LG+F, GTR+I+F). --pplace_model
#pplace_alnmethod: "clustalo"                       # alineamiento: clustalo (def), hmmer o mafft. --pplace_alnmethod
#pplace_taxonomy: "/ruta/taxonomia_referencia.tsv"  # taxonomía de las referencias (TSV). --pplace_taxonomy
